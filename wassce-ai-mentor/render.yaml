services:
  - type: web
    name: wassce-ai-mentor-api
    runtime: python
    region: frankfurt
    plan: free
    branch: master
    rootDir: wassce-ai-mentor
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
      python scripts/init_db.py
      python scripts/ingest.py --reset
    startCommand: PYTHONPATH=. uvicorn api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        value: sqlite:///./wassce_mentor.db
      - key: CHROMA_PERSIST_DIR
        value: ./chroma_store
      - key: CHROMA_COLLECTION_NAME
        value: wassce_qa
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_NUMBER
        sync: false
      - key: AT_USERNAME
        sync: false
      - key: AT_API_KEY
        sync: false
      - key: AT_SHORTCODE
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        sync: false
      - key: DASHBOARD_PASSWORD
        sync: false

  - type: web
    name: wassce-ai-mentor-dashboard
    runtime: python
    region: frankfurt
    plan: free
    branch: master
    rootDir: wassce-ai-mentor
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
    startCommand: PYTHONPATH=. streamlit run dashboard/app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true --server.enableCORS false --server.enableXsrfProtection false
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        value: sqlite:///./wassce_mentor.db
      - key: CHROMA_PERSIST_DIR
        value: ./chroma_store
      - key: CHROMA_COLLECTION_NAME
        value: wassce_qa
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: DASHBOARD_PASSWORD
        sync: false
